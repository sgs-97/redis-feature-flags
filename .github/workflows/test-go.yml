name: Test Go SDK

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run Go SDK tests
        run: |
          cd sdks/go
          go test ./... -v